<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard — Aj. Kring Labroom</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="nav">
  <a href="dashboard.html" class="nav-logo">
    <svg width="28" height="28" viewBox="0 0 48 48"><rect width="48" height="48" rx="10" fill="#F1EFE8"/><rect x="19" y="14" width="10" height="10" rx="3" fill="#F5C4B3"/><rect x="19" y="13" width="10" height="4" rx="2" fill="#444441"/><rect x="18" y="14" width="3" height="5" rx="1" fill="#444441"/><rect x="21" y="18" width="2" height="2" rx="1" fill="#2C2C2A"/><rect x="25" y="18" width="2" height="2" rx="1" fill="#2C2C2A"/><rect x="22" y="21" width="4" height="1" rx="0.5" fill="#993C1D"/><rect x="16" y="24" width="16" height="12" rx="2" fill="#1D9E75"/><rect x="15" y="24" width="4" height="10" rx="1" fill="#fff"/><rect x="29" y="24" width="4" height="10" rx="1" fill="#fff"/><rect x="18" y="35" width="4" height="5" rx="1" fill="#185FA5"/><rect x="26" y="35" width="4" height="5" rx="1" fill="#185FA5"/><rect x="17" y="38" width="5" height="3" rx="1" fill="#2C2C2A"/><rect x="25" y="38" width="5" height="3" rx="1" fill="#2C2C2A"/></svg>
    <div><div class="nav-ln">Aj. Kring Labroom</div><div class="nav-ls">KU_KPS</div></div>
  </a>
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="nav-user">
      <div class="av" id="navAv" style="width:24px;height:24px;font-size:10px"></div>
      <span style="font-size:13px;font-weight:500;color:var(--text)" id="navName"></span>
      <span style="font-size:11px;color:var(--text2)" id="navRole"></span>
    </div>
    <button class="btn btn-sm" onclick="logout()"><i class="ti ti-logout"></i> ออก</button>
  </div>
</nav>

<div class="shell">
  <div id="alertBar" class="warn-box hidden" style="margin-bottom:1rem"></div>

  <!-- Nav grid -->
  <div style="display:grid;grid-template-columns:repeat(3,1fr);margin-bottom:1rem;border:0.5px solid var(--border);border-radius:var(--rl);overflow:hidden;background:var(--bg);">
    <a href="student.html" class="nav-item" style="padding:1.25rem;border-right:0.5px solid var(--border);text-decoration:none;display:block;transition:background .12s;" onmouseover="this.style.background='var(--bg2)'" onmouseout="this.style.background=''">
      <div style="width:32px;height:32px;border-radius:var(--r);background:var(--bg2);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;margin-bottom:8px;font-size:16px;color:var(--text2)"><i class="ti ti-user"></i></div>
      <div style="font-size:13px;font-weight:500;color:var(--text)">หน้าของฉัน</div>
      <div style="font-size:11px;color:var(--text2);margin-top:2px">วิจัย · Notebook · นัดหมาย</div>
    </a>
    <a href="notebook.html" class="nav-item" style="padding:1.25rem;border-right:0.5px solid var(--border);text-decoration:none;display:block;transition:background .12s;" onmouseover="this.style.background='var(--bg2)'" onmouseout="this.style.background=''">
      <div style="width:32px;height:32px;border-radius:var(--r);background:var(--bg2);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;margin-bottom:8px;font-size:16px;color:var(--text2)"><i class="ti ti-notebook"></i></div>
      <div style="font-size:13px;font-weight:500;color:var(--text)">Lab Notebook</div>
      <div style="font-size:11px;color:var(--text2);margin-top:2px">บันทึกงานรายวัน</div>
    </a>
    <a href="plan.html" class="nav-item" style="padding:1.25rem;text-decoration:none;display:block;transition:background .12s;" onmouseover="this.style.background='var(--bg2)'" onmouseout="this.style.background=''">
      <div style="width:32px;height:32px;border-radius:var(--r);background:var(--bg2);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;margin-bottom:8px;font-size:16px;color:var(--text2)"><i class="ti ti-calendar-month"></i></div>
      <div style="font-size:13px;font-weight:500;color:var(--text)">Monthly Plan</div>
      <div style="font-size:11px;color:var(--text2);margin-top:2px">แผนงานรายเดือน</div>
    </a>
  </div>

  <!-- Notifications -->
  <div class="card">
    <div class="sec-hdr"><span class="ct">การแจ้งเตือน</span><span id="notifCount" style="font-size:11px;font-family:'DM Mono',monospace;color:var(--text3)"></span></div>
    <div id="notifList"></div>
  </div>

  <!-- Regulations quick ref -->
  <div class="card">
    <div class="sec-hdr"><span class="ct">ระเบียบ มก. — สิ่งที่ควรรู้</span><a href="regulations.html" class="btn btn-sm">ดูทั้งหมด <i class="ti ti-arrow-right"></i></a></div>
    <div id="regList"></div>
  </div>
</div>

<script src="shared.js"></script>
<script>
const uid = requireLogin();
if(!uid) throw '';
const u = USERS[uid];
document.getElementById('navAv').textContent=u.av; document.getElementById('navAv').style.background=u.avbg; document.getElementById('navAv').style.color=u.avc;
document.getElementById('navName').textContent=u.name.split(' ')[0];
document.getElementById('navRole').textContent=u.role;

// Notifications
const notifs = load(KEYS.notifs, []);
const myNotifs = notifs.filter(n=>n.targets?.includes('all')||n.targets?.includes(uid));
document.getElementById('notifCount').textContent = myNotifs.length+' รายการ';
const typeIcon={deadline:'⚠️',task:'📋',warn:'📢',general:'💬'};
const typeStyle={deadline:'background:#fcebeb;color:#a32d2d',task:'background:#e6f1fb;color:#0c447c',warn:'background:#faeeda;color:#633806',general:'background:#e1f5ee;color:#085041'};
if(myNotifs.some(n=>n.type==='deadline')){
  const ab=document.getElementById('alertBar');
  ab.classList.remove('hidden');
  ab.innerHTML='<i class="ti ti-alert-triangle" style="font-size:16px;flex-shrink:0"></i>'+myNotifs.find(n=>n.type==='deadline').msg;
}
document.getElementById('notifList').innerHTML = myNotifs.length ?
  myNotifs.slice(0,5).map(n=>`<div style="padding:8px 0;border-bottom:0.5px solid var(--border);display:flex;align-items:flex-start;gap:8px"><span style="flex-shrink:0">${typeIcon[n.type]||'💬'}</span><div style="flex:1"><div style="font-size:13px;color:var(--text)">${n.msg}</div><div style="font-size:11px;color:var(--text2);margin-top:2px">${n.time||''}</div></div></div>`).join('') :
  '<div style="font-size:13px;color:var(--text3);padding:8px 0">ไม่มีการแจ้งเตือน</div>';

// Regs quick
const regs = [
  { level:'ป.โท', txt:'ส่ง proposal ก่อนสิ้นเทอม 4 · อนุมัติก่อนสอบ 120 วัน', urgent: u.level==='master' },
  { level:'ป.เอก', txt:'ส่ง proposal ก่อนสิ้นเทอม 6 · อนุมัติก่อนสอบ 365 วัน', urgent: u.level==='phd' },
];
document.getElementById('regList').innerHTML = regs.map(r=>`<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:0.5px solid var(--border)"><span class="badge" style="${r.urgent?'background:#faeeda;color:#633806':'background:var(--bg2);color:var(--text2)'}">${r.level}</span><span style="font-size:13px;color:var(--text)">${r.txt}</span></div>`).join('');

function logout(){ clearSession(); location.href='index.html'; }
</script>
</body>
</html>
