<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard — Kring Labroom</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
/* Plan calendar */
.cal-detail{border:0.5px solid var(--border2);border-radius:var(--rl);padding:1rem 1.25rem;margin-bottom:1rem;background:var(--bg2);}
.plan-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid var(--border);}
.plan-row:last-child{border-bottom:none;}
.cat-btn{padding:3px 9px;font-size:11px;font-family:'DM Mono',monospace;border:0.5px solid var(--border2);border-radius:20px;cursor:pointer;background:var(--bg);color:var(--text2);}
.cat-btn.on{border-color:transparent;}
/* Thesis slider */
.thesis-section{padding:8px 0;border-bottom:0.5px solid var(--border);}
.thesis-section:last-child{border-bottom:none;}
input[type=range]{width:100%;accent-color:var(--color-accent);}
/* Notebook */
.nb-section-box{margin-top:5px;padding:6px 8px;background:var(--bg2);border-radius:var(--r);font-size:12px;line-height:1.5;border-left:2px solid var(--border2);}
/* Task */
.task-item{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--border);}
.task-item:last-child{border-bottom:none;}
</style>
</head>
<body>
<script src="shared.js"></script>
<nav class="nav">
  <a class="nav-logo" href="index.html">
    <svg width="28" height="28" viewBox="0 0 48 48"><rect width="48" height="48" rx="10" fill="#F1EFE8"/><rect x="19" y="14" width="10" height="10" rx="3" fill="#F5C4B3"/><rect x="19" y="13" width="10" height="4" rx="2" fill="#444441"/><rect x="18" y="14" width="3" height="5" rx="1" fill="#444441"/><rect x="21" y="18" width="2" height="2" rx="1" fill="#2C2C2A"/><rect x="25" y="18" width="2" height="2" rx="1" fill="#2C2C2A"/><rect x="22" y="21" width="4" height="1" rx=".5" fill="#993C1D"/><rect x="16" y="24" width="16" height="12" rx="2" fill="#1D9E75"/><rect x="15" y="24" width="4" height="10" rx="1" fill="#fff"/><rect x="29" y="24" width="4" height="10" rx="1" fill="#fff"/><rect x="18" y="35" width="4" height="5" rx="1" fill="#185FA5"/><rect x="26" y="35" width="4" height="5" rx="1" fill="#185FA5"/><rect x="17" y="38" width="5" height="3" rx="1" fill="#2C2C2A"/><rect x="25" y="38" width="5" height="3" rx="1" fill="#2C2C2A"/></svg>
    <div><div class="nav-logo-name">Aj. Kring Labroom</div><div class="nav-logo-sub" id="navSub">KU_KPS</div></div>
  </a>
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="av av-md" id="navAv" style="background:#f1efe8;color:#5f5e5a">?</div>
    <span style="font-size:12px;color:var(--text2)" id="navName"></span>
    <button class="btn btn-sm" onclick="KU.logout()"><i class="ti ti-logout"></i> ออก</button>
  </div>
</nav>

<div class="tabs" id="tabBar"></div>
<div class="page-content" id="mainContent"></div>
<div class="toast" id="toast"></div>

<script>
const sess = KU.requireAuth();
if (!sess) throw new Error('not auth');
document.getElementById('navName').textContent = sess.name;
document.getElementById('navAv').textContent = sess.av;
document.getElementById('navAv').style.background = sess.avbg;
document.getElementById('navAv').style.color = sess.avc;
document.getElementById('navSub').textContent = 'KU_KPS · ' + (sess.level==='ra'?'ผู้ช่วยวิจัย':sess.level==='master'?'ป.โท':sess.level==='phd'?'ป.เอก':'ป.ตรี');

const CATS = {ทดลอง:{bg:'#e1f5ee',c:'#085041',dot:'#1D9E75'},วิเคราะห์:{bg:'#faeeda',c:'#633806',dot:'#EF9F27'},เขียนเล่ม:{bg:'#eeedfe',c:'#3c3489',dot:'#7F77DD'},ประชุม:{bg:'#e6f1fb',c:'#0c447c',dot:'#378ADD'},อ่านเอกสาร:{bg:'#f1efe8',c:'#444441',dot:'#888780'},อื่นๆ:{bg:'#f1efe8',c:'#5f5e5a',dot:'#B4B2A9'}};
const TH_MONTHS=['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

// ===== TABS =====
const TABS = [
  {id:'notebook', icon:'ti-notebook', label:'สมุดแล็บ'},
  {id:'plan',     icon:'ti-calendar-month', label:'แผนงาน'},
  {id:'tasks',    icon:'ti-checkbox', label:'งานที่ได้รับ'},
  {id:'thesis',   icon:'ti-book', label:'เล่ม'},
  {id:'notif',    icon:'ti-bell', label:'แจ้งเตือน'},
];
let activeTab = 'notebook';

function renderTabs() {
  document.getElementById('tabBar').innerHTML = TABS.map(t =>
    `<button class="tab${t.id===activeTab?' active':''}" onclick="switchTab('${t.id}')"><i class="ti ${t.icon}"></i>${t.label}</button>`
  ).join('');
}
function switchTab(id) { activeTab = id; renderTabs(); renderContent(); }

function renderContent() {
  const c = document.getElementById('mainContent');
  if (activeTab==='notebook') c.innerHTML = renderNotebook();
  else if (activeTab==='plan') { c.innerHTML = renderPlan(); initPlan(); }
  else if (activeTab==='tasks') c.innerHTML = renderTasks();
  else if (activeTab==='thesis') c.innerHTML = renderThesis();
  else if (activeTab==='notif') c.innerHTML = renderNotif();
}

// ===== NOTEBOOK =====
let nbFormOpen = false;
let nbType = 'quick';
function renderNotebook() {
  const notes = KU.getNotes(sess.uid);
  return `<div class="card">
    <div class="card-header">
      <span class="card-title">สมุดแล็บ</span>
      <button class="btn btn-pri btn-sm" onclick="toggleNbForm()"><i class="ti ti-plus"></i> เพิ่ม</button>
    </div>
    <div id="nbForm" style="display:none;padding:12px;background:var(--bg2);border-radius:var(--r);margin-bottom:10px">
      <div style="display:flex;gap:5px;margin-bottom:8px">
        <button class="cat-btn on" id="nbt-quick" onclick="setNbType('quick',this)">Quick Note</button>
        <button class="cat-btn" id="nbt-lab" onclick="setNbType('lab',this)">Lab Record</button>
      </div>
      <div class="f-row">
        <div class="f-group" style="margin-bottom:0"><label class="f-label">วันที่</label><input type="date" id="nb-date" class="f-input" style="font-size:12px;padding:6px 8px"></div>
        <div class="f-group" style="margin-bottom:0"><label class="f-label">Tag</label>
          <select id="nb-tag" class="f-input" style="font-size:12px;padding:6px 8px">
            <option>ทดลอง</option><option>วิเคราะห์</option><option>ประชุม</option><option>อ่านเอกสาร</option><option>Lab Record</option>
          </select>
        </div>
      </div>
      <div class="f-group" style="margin-top:8px"><label class="f-label">หัวข้อ</label><input type="text" id="nb-title" class="f-input" placeholder="หัวข้อ"></div>
      <div id="nb-quick-fields">
        <div class="f-group"><label class="f-label">บันทึก</label><textarea id="nb-note" class="f-input"></textarea></div>
      </div>
      <div id="nb-lab-fields" style="display:none">
        <div class="f-group"><label class="f-label">วัตถุประสงค์</label><textarea id="nb-obj" class="f-input" style="min-height:48px"></textarea></div>
        <div class="f-group"><label class="f-label">วัสดุ/วิธีการ</label><textarea id="nb-method" class="f-input" style="min-height:48px"></textarea></div>
        <div class="f-group"><label class="f-label">ผลการทดลอง</label><textarea id="nb-result" class="f-input" style="min-height:48px"></textarea></div>
        <div class="f-group"><label class="f-label">ปัญหา/ข้อสังเกต</label><textarea id="nb-problem" class="f-input" style="min-height:48px"></textarea></div>
        <div class="f-group"><label class="f-label">สรุป</label><textarea id="nb-summary" class="f-input" style="min-height:48px"></textarea></div>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:5px">
        <button class="btn btn-sm" onclick="toggleNbForm()">ยกเลิก</button>
        <button class="btn btn-sm btn-pri" onclick="saveNote()"><i class="ti ti-check"></i> บันทึก</button>
      </div>
    </div>
    <div id="nbList">${notes.length ? notes.slice().reverse().map((n,i) => renderNoteItem(n, notes.length-1-i)).join('') : '<div style="text-align:center;padding:1.5rem;font-size:13px;color:var(--text3)">ยังไม่มีบันทึก — กด + เพื่อเพิ่ม</div>'}</div>
  </div>`;
}

function renderNoteItem(n, idx) {
  const tc = CATS[n.tag] ? `background:${CATS[n.tag].bg};color:${CATS[n.tag].c}` : 'background:#f1efe8;color:#5f5e5a';
  const dt = new Date(n.date).toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'2-digit'});
  return `<div style="padding:10px 0;border-bottom:0.5px solid var(--border)">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
      <span style="font-size:13px;font-weight:500;flex:1">${n.title||'ไม่มีหัวข้อ'}</span>
      <span class="badge" style="${tc}">${n.tag}</span>
      <span style="font-size:11px;font-family:'DM Mono',monospace;color:var(--text3)">${dt}</span>
      <button class="btn btn-sm btn-danger" onclick="delNote(${idx})" style="padding:2px 6px"><i class="ti ti-trash" style="font-size:10px"></i></button>
    </div>
    ${n.type==='quick' ? `<div style="font-size:13px;color:var(--text2);line-height:1.5">${n.note||''}</div>` :
    `${n.objective?`<div class="nb-section-box"><div style="font-size:10px;font-family:'DM Mono',monospace;color:var(--text2);margin-bottom:2px">วัตถุประสงค์</div>${n.objective}</div>`:''}
     ${n.result?`<div class="nb-section-box" style="margin-top:4px;border-left-color:#1D9E75"><div style="font-size:10px;font-family:'DM Mono',monospace;color:var(--text2);margin-bottom:2px">ผล</div>${n.result}</div>`:''}
     ${n.problem?`<div class="nb-section-box" style="margin-top:4px;border-left-color:#E24B4A"><div style="font-size:10px;font-family:'DM Mono',monospace;color:var(--text2);margin-bottom:2px">ปัญหา</div>${n.problem}</div>`:''}
     ${n.summary?`<div class="nb-section-box" style="margin-top:4px;border-left-color:#378ADD"><div style="font-size:10px;font-family:'DM Mono',monospace;color:var(--text2);margin-bottom:2px">สรุป</div>${n.summary}</div>`:''}`}
  </div>`;
}

function toggleNbForm() {
  const f = document.getElementById('nbForm');
  f.style.display = f.style.display==='none'?'block':'none';
  if (f.style.display==='block') document.getElementById('nb-date').value = new Date().toISOString().slice(0,10);
}
function setNbType(type, btn) {
  nbType = type;
  document.querySelectorAll('.cat-btn').forEach(b=>{b.classList.remove('on');});
  btn.classList.add('on');
  document.getElementById('nb-quick-fields').style.display = type==='quick'?'block':'none';
  document.getElementById('nb-lab-fields').style.display = type==='lab'?'block':'none';
  if (type==='lab') document.getElementById('nb-tag').value='Lab Record';
}
function saveNote() {
  const title = document.getElementById('nb-title').value.trim();
  if (!title) { showToast('กรุณาใส่หัวข้อ'); return; }
  const notes = KU.getNotes(sess.uid);
  const note = {id:'n'+Date.now(),type:nbType,date:document.getElementById('nb-date').value,title,tag:document.getElementById('nb-tag').value};
  if (nbType==='quick') note.note = document.getElementById('nb-note').value;
  else { note.objective=document.getElementById('nb-obj').value; note.method=document.getElementById('nb-method').value; note.result=document.getElementById('nb-result').value; note.problem=document.getElementById('nb-problem').value; note.summary=document.getElementById('nb-summary').value; }
  notes.push(note);
  KU.setNotes(sess.uid, notes);
  showToast('บันทึกแล้ว'); switchTab('notebook');
}
function delNote(idx) {
  const notes = KU.getNotes(sess.uid);
  notes.splice(idx, 1);
  KU.setNotes(sess.uid, notes);
  switchTab('notebook');
}

// ===== PLAN CALENDAR =====
let planYear = new Date().getFullYear();
let planMonth = new Date().getMonth()+1;
let planDay = null;
let planCat = 'ทดลอง';

function renderPlan() {
  return `<div class="card">
    <div class="card-header">
      <span class="card-title">แผนงานรายวัน</span>
      <div style="display:flex;align-items:center;gap:6px">
        <button class="btn btn-sm" onclick="planPrev()"><i class="ti ti-chevron-left"></i></button>
        <span id="planMonthLbl" style="font-size:13px;font-weight:500;font-family:'DM Mono',monospace;min-width:90px;text-align:center"></span>
        <button class="btn btn-sm" onclick="planNext()"><i class="ti ti-chevron-right"></i></button>
      </div>
    </div>
    <div class="cal-dow">${['อา','จ','อ','พ','พฤ','ศ','ส'].map(d=>`<span>${d}</span>`).join('')}</div>
    <div class="cal-grid" id="planGrid"></div>
  </div>
  <div id="planDetail" style="display:none" class="cal-detail">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <span id="planDetailDate" style="font-size:14px;font-weight:500;font-family:'DM Mono',monospace"></span>
      <button class="btn btn-sm btn-pri" onclick="togglePlanForm()"><i class="ti ti-plus"></i> เพิ่มแผน</button>
    </div>
    <div id="planDayList"></div>
    <div id="planAddForm" style="display:none;margin-top:8px;padding:10px;background:var(--bg);border-radius:var(--r);border:0.5px solid var(--border)">
      <div class="f-group"><label class="f-label">แผนงาน</label><input type="text" id="planInp" class="f-input" placeholder="เช่น สกัด DNA ตัวอย่างชุดที่ 2" onkeydown="if(event.key==='Enter')savePlanItem()"></div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px" id="planCatBtns"></div>
      <div style="display:flex;gap:5px;justify-content:flex-end">
        <button class="btn btn-sm" onclick="togglePlanForm()">ยกเลิก</button>
        <button class="btn btn-sm btn-pri" onclick="savePlanItem()"><i class="ti ti-check"></i> บันทึก</button>
      </div>
    </div>
  </div>`;
}

function initPlan() {
  renderPlanCal();
}
function renderPlanCal() {
  document.getElementById('planMonthLbl').textContent = TH_MONTHS[planMonth]+' '+(planYear+543);
  const firstDay = new Date(planYear,planMonth-1,1).getDay();
  const daysInMonth = new Date(planYear,planMonth,0).getDate();
  const today = new Date();
  const todayStr = today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
  const plans = KU.getPlans(sess.uid);
  let html = '';
  for(let i=0;i<firstDay;i++) html+='<div class="cal-day empty"></div>';
  for(let d=1;d<=daysInMonth;d++){
    const ds=planYear+'-'+String(planMonth).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const items=plans[ds]||[];
    const isSel=ds===planDay;
    const chips=items.slice(0,2).map(p=>{const c=CATS[p.cat]||CATS['อื่นๆ'];return`<div class="plan-chip" style="background:${c.bg};color:${c.c}">${p.txt}</div>`;}).join('');
    const more=items.length>2?`<div style="font-size:10px;color:var(--text3)">+${items.length-2}</div>`:'';
    html+=`<div class="cal-day${ds===todayStr?' today':''}${isSel?' selected':''}" onclick="selectPlanDay('${ds}',${d})">
      <div class="cal-day-num">${d}</div>${chips}${more}
    </div>`;
  }
  document.getElementById('planGrid').innerHTML=html;
  if (planDay) renderPlanDetail();
}
function selectPlanDay(ds,d){
  planDay=ds;
  renderPlanCal();
  document.getElementById('planDetail').style.display='block';
  document.getElementById('planAddForm').style.display='none';
}
function renderPlanDetail(){
  const [y,m,d]=planDay.split('-');
  document.getElementById('planDetailDate').textContent=parseInt(d)+' '+TH_MONTHS[parseInt(m)]+' '+(parseInt(y)+543);
  const plans=KU.getPlans(sess.uid);
  const items=plans[planDay]||[];
  document.getElementById('planDayList').innerHTML=items.length?items.map((p,i)=>{const c=CATS[p.cat]||CATS['อื่นๆ'];return`<div class="plan-row"><div style="width:8px;height:8px;border-radius:50%;background:${c.dot};flex-shrink:0"></div><span style="flex:1;font-size:13px">${p.txt}</span><span class="badge" style="background:${c.bg};color:${c.c}">${p.cat}</span><button onclick="delPlanItem(${i})" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:11px;padding:2px 4px"><i class="ti ti-trash"></i></button></div>`;}).join(''):'<div style="font-size:13px;color:var(--text3);padding:4px 0">ไม่มีแผนงานวันนี้</div>';
}
function togglePlanForm(){
  const f=document.getElementById('planAddForm');
  f.style.display=f.style.display==='none'?'block':'none';
  if(f.style.display==='block'){
    document.getElementById('planCatBtns').innerHTML=Object.entries(CATS).map(([cat,c])=>`<span class="cat-btn${cat===planCat?' on':''}" style="${cat===planCat?'background:'+c.dot+';color:#fff;border-color:transparent':''}" onclick="selPlanCat('${cat}',this)">${cat}</span>`).join('');
    setTimeout(()=>document.getElementById('planInp').focus(),50);
  }
}
function selPlanCat(cat,btn){planCat=cat;document.querySelectorAll('#planCatBtns .cat-btn').forEach(b=>{b.classList.remove('on');b.style.background='';b.style.color='';b.style.borderColor='';});btn.classList.add('on');const c=CATS[cat];btn.style.background=c.dot;btn.style.color='#fff';btn.style.borderColor='transparent';}
function savePlanItem(){
  const txt=document.getElementById('planInp').value.trim();
  if(!txt){showToast('กรุณาใส่แผนงาน');return;}
  const plans=KU.getPlans(sess.uid);
  if(!plans[planDay])plans[planDay]=[];
  plans[planDay].push({txt,cat:planCat});
  KU.setPlans(sess.uid,plans);
  document.getElementById('planInp').value='';
  document.getElementById('planAddForm').style.display='none';
  renderPlanCal();
  showToast('บันทึกแล้ว');
}
function delPlanItem(i){const plans=KU.getPlans(sess.uid);plans[planDay].splice(i,1);KU.setPlans(sess.uid,plans);renderPlanCal();}
function planPrev(){planMonth--;if(planMonth<1){planMonth=12;planYear--;}planDay=null;document.getElementById('planDetail').style.display='none';renderPlanCal();}
function planNext(){planMonth++;if(planMonth>12){planMonth=1;planYear++;}planDay=null;document.getElementById('planDetail').style.display='none';renderPlanCal();}

// ===== TASKS =====
function renderTasks(){
  const tasks=KU.getTasks().filter(t=>t.target===sess.uid||t.target==='all');
  return`<div class="card">
    <div class="card-header"><span class="card-title">งานที่ได้รับมอบหมาย</span></div>
    ${tasks.length?tasks.map((t,i)=>`<div class="task-item">
      <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask('${t.id}',this)" style="width:14px;height:14px;margin-top:2px;flex-shrink:0;accent-color:var(--color-accent)">
      <div style="flex:1">
        <div style="font-size:13px;font-weight:500;${t.done?'text-decoration:line-through;color:var(--text3)':''}">${t.name}</div>
        ${t.due?`<div style="font-size:11px;font-family:'DM Mono',monospace;color:var(--text2);margin-top:2px">กำหนดส่ง: ${t.due}</div>`:''}
        ${t.proto?`<div style="margin-top:5px;padding:6px 8px;background:var(--bg2);border-radius:var(--r);font-size:12px;color:var(--text2);white-space:pre-line;border-left:2px solid var(--color-accent)">${t.proto}</div>`:''}
      </div>
      <span class="badge" style="${t.done?'background:#e1f5ee;color:#085041':'background:#faeeda;color:#633806'}">${t.done?'เสร็จแล้ว':'กำลังทำ'}</span>
    </div>`).join(''):'<div style="text-align:center;padding:1.5rem;font-size:13px;color:var(--text3)">ไม่มีงานที่ได้รับมอบหมาย</div>'}
  </div>`;
}
function toggleTask(id,cb){
  const tasks=KU.getTasks();
  const t=tasks.find(t=>t.id===id);
  if(t){t.done=cb.checked;KU.setTasks(tasks);switchTab('tasks');}
}

// ===== THESIS =====
function renderThesis(){
  const th=KU.getThesis(sess.uid);
  const lvl=sess.level;
  let sections=[];
  if(lvl==='bachelor'){
    sections=[
      {id:'s1',group:'ส่วนที่ 1 — หน้าต้น',items:['ปก','บทคัดย่อ','กิตติกรรมประกาศ','สารบัญ']},
      {id:'s2',group:'ส่วนที่ 2 — เนื้อหา',items:['บทนำ','วัตถุประสงค์','การตรวจเอกสาร','อุปกรณ์และวิธีการ','ผลและวิจารณ์','สรุปและข้อเสนอแนะ']},
      {id:'s3',group:'ส่วนที่ 3–5 — ท้ายเล่ม',items:['เอกสารอ้างอิง','ภาคผนวก','ประวัติผู้เขียน']},
    ];
  } else if(lvl==='master'){
    sections=[
      {id:'p1',group:'Phase 1 — Proposal',items:['บทที่ 1 บทนำ','บทที่ 2 การตรวจเอกสาร','บทที่ 3 วิธีการ (draft)','นำเสนอ Committee']},
      {id:'p2',group:'Phase 2 — วิทยานิพนธ์ฉบับเต็ม',items:['Front Matter','บทที่ 1','บทที่ 2','บทที่ 3 วิธีการ','บทที่ 4 ผลและวิจารณ์','บทที่ 5 สรุป','บรรณานุกรม','ภาคผนวก']},
    ];
  } else {
    sections=[
      {id:'d1',group:'Phase 1 — Proposal',items:['บทที่ 1','บทที่ 2','บทที่ 3 วิธีการ','นำเสนอ Committee']},
      {id:'d2',group:'Phase 2 — ดุษฎีนิพนธ์',items:['Front Matter','บทที่ 1','บทที่ 2','การทดลองที่ 1','การทดลองที่ 2','บทที่สรุป','บรรณานุกรม']},
      {id:'d3',group:'Phase 3 — Publication',items:['ต้นฉบับบทความ 1','ต้นฉบับบทความ 2','ตีพิมพ์/Accepted']},
    ];
  }
  return sections.map(sec=>`<div class="card">
    <div class="card-header"><span class="card-title">${sec.group}</span></div>
    ${sec.items.map(item=>{
      const key=sec.id+'_'+item.replace(/\s/g,'_');
      const val=th[key]?.pct||0;
      const colors=['#E24B4A','#EF9F27','#EF9F27','#1D9E75','#1D9E75'];
      const col=val>=75?colors[3]:val>=50?colors[2]:val>=25?colors[1]:colors[0];
      return`<div class="thesis-section">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:13px;flex:1">${item}</span>
          <span style="font-size:12px;font-family:'DM Mono',monospace;font-weight:500;color:${col};min-width:32px;text-align:right">${val}%</span>
        </div>
        <input type="range" min="0" max="100" step="5" value="${val}" oninput="updateThesis('${key}',this.value,this.nextElementSibling)" style="margin:4px 0;width:100%">
        <div style="display:flex;gap:4px;margin-bottom:2px">
          ${[0,25,50,75,100].map(v=>`<button class="btn btn-sm" style="padding:2px 6px;font-size:10px;flex:1;justify-content:center" onclick="quickSetThesis('${key}',${v})">${v}%</button>`).join('')}
        </div>
      </div>`;
    }).join('')}
  </div>`).join('');
}
function updateThesis(key,val){const th=KU.getThesis(sess.uid);if(!th[key])th[key]={};th[key].pct=parseInt(val);KU.setThesis(sess.uid,th);renderContent();}
function quickSetThesis(key,val){const th=KU.getThesis(sess.uid);if(!th[key])th[key]={};th[key].pct=val;KU.setThesis(sess.uid,th);renderContent();}

// ===== NOTIF =====
function renderNotif(){
  const notifs=KU.getNotifs(sess.uid);
  const typeStyle={deadline:{bg:'#fcebeb',c:'#a32d2d',icon:'⚠️'},task:{bg:'#e6f1fb',c:'#0c447c',icon:'📋'},warn:{bg:'#faeeda',c:'#633806',icon:'📢'},general:{bg:'#e1f5ee',c:'#085041',icon:'💬'}};
  return`<div class="card">
    <div class="card-header"><span class="card-title">การแจ้งเตือน</span></div>
    ${notifs.length?notifs.slice().reverse().map(n=>{const s=typeStyle[n.type]||typeStyle.general;return`<div style="padding:10px 0;border-bottom:0.5px solid var(--border);display:flex;align-items:flex-start;gap:8px">
      <span style="font-size:14px;flex-shrink:0">${s.icon}</span>
      <div style="flex:1"><div style="font-size:13px;line-height:1.5">${n.msg}</div><div style="font-size:11px;font-family:'DM Mono',monospace;color:var(--text3);margin-top:3px">${n.time}</div></div>
    </div>`;}).join(''):'<div style="text-align:center;padding:1.5rem;font-size:13px;color:var(--text3)">ไม่มีการแจ้งเตือน</div>'}
  </div>`;
}

function showToast(msg){const t=document.getElementById('toast');t.innerHTML='<i class="ti ti-check"></i> '+msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

renderTabs();
renderContent();
</script>
</body>
