<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aj. Kring Labroom — KU_KPS</title>
<link rel="stylesheet" href="style.css">
<style>
.recent-card {
  padding: 8px 10px;
  border: 0.5px solid var(--border);
  border-radius: var(--r);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 5px;
  transition: all .12s;
}
.recent-card:hover { border-color: var(--border2); background: var(--bg2); }
.recent-card .chk { margin-left: auto; width: 14px; height: 14px; border-radius: 50%; border: 0.5px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.recent-card.sel { border-color: var(--border2); background: var(--bg2); }
.recent-card.sel .chk { background: var(--text); border-color: var(--text); }
.divider { display: flex; align-items: center; gap: 8px; margin: 12px 0; color: var(--text3); font-size: 11px; font-family: 'DM Mono', monospace; }
.divider::before, .divider::after { content: ''; flex: 1; height: 0.5px; background: var(--border); }
</style>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-logo">
    <svg width="32" height="32" viewBox="0 0 48 48"><rect width="48" height="48" rx="10" fill="#F1EFE8"/><rect x="19" y="14" width="10" height="10" rx="3" fill="#F5C4B3"/><rect x="19" y="13" width="10" height="4" rx="2" fill="#444441"/><rect x="18" y="14" width="3" height="5" rx="1" fill="#444441"/><rect x="21" y="18" width="2" height="2" rx="1" fill="#2C2C2A"/><rect x="25" y="18" width="2" height="2" rx="1" fill="#2C2C2A"/><rect x="22" y="21" width="4" height="1" rx="0.5" fill="#993C1D"/><rect x="16" y="24" width="16" height="12" rx="2" fill="#1D9E75"/><rect x="15" y="24" width="4" height="10" rx="1" fill="#fff"/><rect x="29" y="24" width="4" height="10" rx="1" fill="#fff"/><rect x="18" y="35" width="4" height="5" rx="1" fill="#185FA5"/><rect x="26" y="35" width="4" height="5" rx="1" fill="#185FA5"/><rect x="17" y="38" width="5" height="3" rx="1" fill="#2C2C2A"/><rect x="25" y="38" width="5" height="3" rx="1" fill="#2C2C2A"/></svg>
    <div><div class="nav-ln">Aj. Kring Labroom</div><div class="nav-ls">KU_KPS · Kasetsart University</div></div>
  </a>
  <span style="font-size:11px;font-family:'DM Mono',monospace;background:var(--bg2);color:var(--text2);padding:4px 10px;border-radius:20px;border:0.5px solid var(--border)">v2025</span>
</nav>

<div style="display:grid;grid-template-columns:1fr 380px;min-height:calc(100vh - 53px);">

  <!-- LEFT: Announcements -->
  <div style="padding:2.5rem 2rem;border-right:0.5px solid var(--border);display:flex;flex-direction:column;gap:1rem;background:var(--bg);">
    <div style="font-size:10px;font-family:'DM Mono',monospace;color:var(--text2);letter-spacing:.08em;text-transform:uppercase;display:flex;align-items:center;gap:6px;">
      <span style="display:inline-block;width:14px;height:1px;background:var(--text2)"></span>ประกาศห้องแล็บ
    </div>
    <div id="announcements"></div>
    <div style="margin-top:auto;padding:14px;background:var(--bg2);border-radius:var(--rl);border:0.5px solid var(--border);">
      <div style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px">นิสิตใหม่?</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:10px;line-height:1.5">สมัครสมาชิกเพื่อเข้าใช้ระบบ อาจารย์จะตรวจสอบและอนุมัติภายใน 1-2 วัน</div>
      <a href="register.html" class="btn btn-pri" style="width:100%;justify-content:center"><i class="ti ti-user-plus" style="font-size:13px"></i> สมัครสมาชิก</a>
    </div>
  </div>

  <!-- RIGHT: Login -->
  <div style="padding:2rem 1.5rem;background:var(--bg);overflow-y:auto;">
    <div style="font-size:15px;font-weight:500;color:var(--text);margin-bottom:3px">เข้าสู่ระบบ</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:1.25rem">Aj. Kring Labroom · KU_KPS</div>

    <div id="loginErr" class="err-box"><i class="ti ti-alert-circle"></i><span id="errTxt"></span></div>

    <!-- Recent logins -->
    <div id="recentSection" class="hidden">
      <label class="f-lbl" style="margin-bottom:6px">เข้าสู่ระบบล่าสุด</label>
      <div id="recentList"></div>
      <div class="divider">หรือเข้าด้วยบัญชีอื่น</div>
    </div>

    <!-- Manual login form -->
    <div id="manualForm">
      <div class="f-group">
        <label class="f-lbl">Username</label>
        <input type="text" id="usernameIn" class="f-inp" placeholder="เช่น ra2 หรืออีเมล" autocomplete="username"
          onkeydown="if(event.key==='Enter')document.getElementById('passIn').focus()">
      </div>
      <div class="f-group">
        <label class="f-lbl">รหัสผ่าน</label>
        <div style="position:relative">
          <input type="password" id="passIn" class="f-inp" placeholder="••••••" autocomplete="current-password"
            onkeydown="if(event.key==='Enter')doLogin()" style="padding-right:36px">
          <button onclick="togglePass()" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:0" id="eyeBtn">
            <i class="ti ti-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>
      <button class="btn btn-pri" style="width:100%;justify-content:center;margin-bottom:8px" onclick="doLogin()">
        <i class="ti ti-arrow-right"></i> เข้าสู่ระบบ
      </button>
    </div>

    <!-- Quick login (after recent card selected) -->
    <div id="quickLogin" style="display:none">
      <div class="f-group">
        <label class="f-lbl">รหัสผ่าน</label>
        <div style="position:relative">
          <input type="password" id="quickPass" class="f-inp" placeholder="••••••" autocomplete="current-password"
            onkeydown="if(event.key==='Enter')doQuickLogin()" style="padding-right:36px">
          <button onclick="toggleQuickPass()" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:0">
            <i class="ti ti-eye" id="qEyeIcon"></i>
          </button>
        </div>
      </div>
      <button class="btn btn-pri" style="width:100%;justify-content:center;margin-bottom:8px" onclick="doQuickLogin()">
        <i class="ti ti-arrow-right"></i> เข้าสู่ระบบ
      </button>
      <button class="btn" style="width:100%;justify-content:center;font-size:12px" onclick="cancelQuick()">
        <i class="ti ti-x"></i> ยกเลิก
      </button>
    </div>


  </div>
</div>

<script src="shared.js"></script>
<script>
// Check already logged in
if (new URLSearchParams(location.search).get('clear') !== null) {
  localStorage.clear();
  location.href = 'index.html';
}
const s = getSession();
if (s) {
  if (USERS[s.uid]?.level === 'admin') location.href = 'admin.html';
  else location.href = 'dashboard.html';
}

// Announcements
const anns = [
  { tag:'ใหม่', tagStyle:'background:#e1f5ee;color:#085041', txt:'รับสมัครนิสิต ป.เอก สาขา Plant Pathology ปีการศึกษา 2568', date:'15 พ.ค. 2568' },
  { tag:'ประชุม', tagStyle:'background:#e6f1fb;color:#0c447c', txt:'Lab meeting ทุกวันพุธ 10.00 น. ห้อง 302', date:'20 พ.ค. 2568' },
  { tag:'แจ้งเตือน', tagStyle:'background:#faeeda;color:#633806', txt:'ส่งรายงานความคืบหน้า RD-2024-01 ภายใน 31 พ.ค. นี้', date:'18 พ.ค. 2568' },
  { tag:'ผลงาน', tagStyle:'background:#eeedfe;color:#3c3489', txt:'Paper ของทีมได้รับการตอบรับจาก Phytopathology — ยินดีด้วย!', date:'10 พ.ค. 2568' },
];
document.getElementById('announcements').innerHTML = anns.map(a =>
  `<div style="padding:10px 12px;border:0.5px solid var(--border);border-radius:var(--rl);margin-bottom:8px">
    <div style="font-size:10px;padding:1px 7px;border-radius:20px;font-family:'DM Mono',monospace;margin-bottom:4px;display:inline-block;${a.tagStyle}">${a.tag}</div>
    <div style="font-size:13px;font-weight:500;color:var(--text)">${a.txt}</div>
    <div style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px">${a.date}</div>
  </div>`
).join('');

// ===== RECENT LOGINS =====
const RECENT_KEY = 'kring_recent';
let selectedRecentUID = null;

function getRecent() {
  try { return JSON.parse(localStorage.getItem(RECENT_KEY)) || []; } catch { return []; }
}
function saveRecent(uid) {
  let recent = getRecent().filter(r => r !== uid);
  recent.unshift(uid);
  recent = recent.slice(0, 3); // keep max 3
  localStorage.setItem(RECENT_KEY, JSON.stringify(recent));
}

function renderRecent() {
  const recent = getRecent().filter(uid => USERS[uid]);
  if (!recent.length) return;

  document.getElementById('recentSection').classList.remove('hidden');
  document.getElementById('recentList').innerHTML = recent.map(uid => {
    const u = USERS[uid];
    return `<div class="recent-card" onclick="selectRecent(this,'${uid}')" id="rc_${uid}">
      <div class="av" style="background:${u.avbg};color:${u.avc};width:32px;height:32px;font-size:11px">${u.av}</div>
      <div>
        <div style="font-size:13px;font-weight:500;color:var(--text)">${u.name}</div>
        <div style="font-size:11px;color:var(--text2)">${u.role}</div>
      </div>
      <div class="chk">
        <svg width="7" height="7" viewBox="0 0 8 8"><polyline points="1.5,4 3.5,6 6.5,2" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
      </div>
    </div>`;
  }).join('');
}

function selectRecent(el, uid) {
  selectedRecentUID = uid;
  document.querySelectorAll('.recent-card').forEach(c => c.classList.remove('sel'));
  el.classList.add('sel');
  // Show quick password panel
  document.getElementById('manualForm').style.display = 'none';
  document.getElementById('quickLogin').style.display = 'block';
  document.getElementById('loginErr').classList.remove('on');
  setTimeout(() => document.getElementById('quickPass').focus(), 50);
}

function cancelQuick() {
  selectedRecentUID = null;
  document.querySelectorAll('.recent-card').forEach(c => c.classList.remove('sel'));
  document.getElementById('quickLogin').style.display = 'none';
  document.getElementById('manualForm').style.display = 'block';
  document.getElementById('loginErr').classList.remove('on');
}

function doQuickLogin() {
  if (!selectedRecentUID) return;
  const pass = document.getElementById('quickPass').value;
  const u = USERS[selectedRecentUID];
  if (!u || u.pass !== pass) { showLoginErr('รหัสผ่านไม่ถูกต้อง'); return; }
  loginSuccess(selectedRecentUID);
}

// ===== MANUAL LOGIN =====
function doLogin() {
  const username = document.getElementById('usernameIn').value.trim().toLowerCase();
  const pass = document.getElementById('passIn').value;
  if (!username) { showLoginErr('กรุณาใส่ Username'); return; }
  if (!pass) { showLoginErr('กรุณาใส่รหัสผ่าน'); return; }

  // 1. เช็คจาก USERS object (admin + demo accounts)
  let matchUID = null;
  let matchPass = null;
  for (const [uid, u] of Object.entries(USERS)) {
    if (uid === username || uid.toLowerCase() === username) { matchUID = uid; matchPass = u.pass; break; }
    const shortName = u.name.split(' ')[0].toLowerCase();
    if (shortName === username) { matchUID = uid; matchPass = u.pass; break; }
  }

  // 2. เช็คจาก approved members ใน localStorage
  if (!matchUID) {
    const members = load(KEYS.members, []);
    const found = members.find(m =>
      (m.email && m.email.toLowerCase() === username) ||
      (m.sid && m.sid === username) ||
      (m.uid && m.uid === username)
    );
    if (found) { matchUID = found.uid; matchPass = found.pass; }
  }

  if (!matchUID || matchPass !== pass) {
    showLoginErr('Username หรือรหัสผ่านไม่ถูกต้อง');
    return;
  }
  loginSuccess(matchUID);
}

function loginSuccess(uid) {
  setSession(uid);
  saveRecent(uid);
  location.href = USERS[uid].level === 'admin' ? 'admin.html' : 'dashboard.html';
}

function showLoginErr(m) {
  const e = document.getElementById('loginErr');
  document.getElementById('errTxt').textContent = m;
  e.classList.add('on');
}

// Toggle password visibility
function togglePass() {
  const inp = document.getElementById('passIn');
  const icon = document.getElementById('eyeIcon');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  icon.className = inp.type === 'password' ? 'ti ti-eye' : 'ti ti-eye-off';
}
function toggleQuickPass() {
  const inp = document.getElementById('quickPass');
  const icon = document.getElementById('qEyeIcon');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  icon.className = inp.type === 'password' ? 'ti ti-eye' : 'ti ti-eye-off';
}

renderRecent();
</script>
</body>
</html>
