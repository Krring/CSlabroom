<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Monthly Plan — Aj. Kring Labroom</title>
<link rel="stylesheet" href="style.css">
<style>
.dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:2px;}
.dow{text-align:center;font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);padding:4px 0;}
.day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.day-cell{border:0.5px solid var(--border);border-radius:6px;padding:4px 5px;min-height:72px;cursor:pointer;transition:border-color .12s;}
.day-cell:hover{border-color:var(--border2);background:var(--bg2);}
.day-cell.today{border-color:var(--blue);}
.day-cell.selected{border-color:var(--border2);background:var(--bg2);}
.day-cell.empty{border-color:transparent;cursor:default;background:none;}
.day-cell.empty:hover{background:none;}
.day-num{font-size:11px;font-family:'DM Mono',monospace;color:var(--text2);margin-bottom:2px;}
.day-cell.today .day-num{color:#0c447c;font-weight:500;}
.plan-chip{font-size:10px;padding:1px 4px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4;}
.more{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;}
.detail-panel{border:0.5px solid var(--border2);border-radius:var(--rl);padding:1rem 1.25rem;margin-top:10px;background:var(--bg2);}
.cat-btn{padding:3px 9px;font-size:11px;font-family:'DM Mono',monospace;border:0.5px solid var(--border2);border-radius:20px;cursor:pointer;background:var(--bg);color:var(--text2);}
.cat-btn.on{border-color:transparent;font-weight:500;}
</style>
</head>
<body>
<nav class="nav">
  <a href="dashboard.html" class="nav-logo">
    <svg width="28" height="28" viewBox="0 0 48 48"><rect width="48" height="48" rx="10" fill="#F1EFE8"/><rect x="16" y="24" width="16" height="12" rx="2" fill="#1D9E75"/><rect x="19" y="14" width="10" height="10" rx="3" fill="#F5C4B3"/></svg>
    <div><div class="nav-ln">Aj. Kring Labroom</div><div class="nav-ls">Monthly Plan</div></div>
  </a>
  <div style="display:flex;align-items:center;gap:8px">
    <div class="nav-user"><div class="av" id="navAv" style="width:22px;height:22px;font-size:10px"></div><span style="font-size:13px;font-weight:500" id="navName"></span></div>
    <a href="dashboard.html" class="btn btn-sm"><i class="ti ti-arrow-left"></i> กลับ</a>
  </div>
</nav>

<div class="shell">
  <!-- Month nav -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
    <div style="display:flex;gap:6px;flex-wrap:wrap" id="catSummary"></div>
    <div style="display:flex;align-items:center;gap:6px">
      <button class="btn btn-sm" onclick="prevMonth()"><i class="ti ti-chevron-left"></i></button>
      <span style="font-size:14px;font-weight:500;font-family:'DM Mono',monospace;min-width:110px;text-align:center" id="monthLbl"></span>
      <button class="btn btn-sm" onclick="nextMonth()"><i class="ti ti-chevron-right"></i></button>
    </div>
  </div>

  <!-- Calendar -->
  <div class="dow-row">
    <div class="dow">อา</div><div class="dow">จ</div><div class="dow">อ</div><div class="dow">พ</div>
    <div class="dow">พฤ</div><div class="dow">ศ</div><div class="dow">ส</div>
  </div>
  <div class="day-grid" id="dayGrid"></div>

  <!-- Detail panel -->
  <div id="detailPanel" style="display:none" class="detail-panel">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <span style="font-size:14px;font-weight:500;font-family:'DM Mono',monospace" id="detailDate"></span>
      <button class="btn btn-sm btn-pri" onclick="toggleAddForm()"><i class="ti ti-plus"></i> เพิ่มแผน</button>
    </div>
    <div id="dayPlanList"></div>
    <div id="addForm" style="display:none;margin-top:10px;padding:10px;background:var(--bg);border-radius:var(--r);border:0.5px solid var(--border)">
      <div class="f-group"><label class="f-lbl">แผนงาน</label><input type="text" id="planInput" class="f-inp" placeholder="เช่น วิเคราะห์ผล PCR" onkeydown="if(event.key==='Enter')savePlan()"></div>
      <div class="f-group"><label class="f-lbl">หมวด</label><div style="display:flex;gap:4px;flex-wrap:wrap" id="catBtns"></div></div>
      <div style="display:flex;gap:5px;justify-content:flex-end;margin-top:8px">
        <button class="btn btn-sm" onclick="toggleAddForm()">ยกเลิก</button>
        <button class="btn btn-sm btn-pri" onclick="savePlan()"><i class="ti ti-check"></i> เพิ่ม</button>
      </div>
    </div>
  </div>
</div>

<div id="_toast" style="position:fixed;bottom:20px;right:20px;background:#1a1a18;color:#fff;padding:9px 16px;border-radius:8px;font-size:13px;display:none;align-items:center;gap:8px;z-index:9999"></div>
<script src="shared.js"></script>
<script>
const uid = requireLogin();
if(!uid) throw '';
const u = USERS[uid];
document.getElementById('navAv').textContent=u.av; document.getElementById('navAv').style.background=u.avbg; document.getElementById('navAv').style.color=u.avc;
document.getElementById('navName').textContent=u.name.split(' ')[0];

const CATS={ทดลอง:{bg:'#e1f5ee',c:'#085041',dot:'#1D9E75'},วิเคราะห์:{bg:'#faeeda',c:'#633806',dot:'#EF9F27'},เขียนเล่ม:{bg:'#eeedfe',c:'#3c3489',dot:'#7F77DD'},ประชุม:{bg:'#e6f1fb',c:'#0c447c',dot:'#378ADD'},อ่านเอกสาร:{bg:'#f1efe8',c:'#444441',dot:'#888780'},อื่นๆ:{bg:'#f1efe8',c:'#5f5e5a',dot:'#B4B2A9'}};
const TH_M=['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

const now=new Date();
let curY=now.getFullYear(), curM=now.getMonth()+1, selDay=null, selCat='ทดลอง';

function planKey(d){ return d; }
function getPlans(d){ const p=load(KEYS.plans(uid),{}); return p[d]||[]; }
function setPlans(d,arr){ const p=load(KEYS.plans(uid),{}); p[d]=arr; save(KEYS.plans(uid),p); }

function renderCal(){
  document.getElementById('monthLbl').textContent=TH_M[curM]+' '+(curY+543);
  const firstDay=new Date(curY,curM-1,1).getDay();
  const daysInMonth=new Date(curY,curM,0).getDate();
  const todayStr=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  let html='';
  for(let i=0;i<firstDay;i++) html+='<div class="day-cell empty"></div>';
  for(let d=1;d<=daysInMonth;d++){
    const ds=curY+'-'+String(curM).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const plans=getPlans(ds); const isToday=ds===todayStr; const isSel=ds===selDay;
    let chips=plans.slice(0,2).map(p=>{const c=CATS[p.cat]||CATS['อื่นๆ'];return`<div class="plan-chip" style="background:${c.bg};color:${c.c}">${p.txt}</div>`;}).join('');
    if(plans.length>2) chips+=`<div class="more">+${plans.length-2}</div>`;
    html+=`<div class="day-cell${isToday?' today':''}${isSel?' selected':''}" onclick="selectDay('${ds}',${d})">
      <div class="day-num">${d}</div>${chips}</div>`;
  }
  document.getElementById('dayGrid').innerHTML=html;
  renderSummary();
  if(selDay) renderDetail();
}

function renderSummary(){
  const all=[];
  const daysInMonth=new Date(curY,curM,0).getDate();
  for(let d=1;d<=daysInMonth;d++){
    const ds=curY+'-'+String(curM).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    getPlans(ds).forEach(p=>all.push(p));
  }
  const cats={};all.forEach(p=>{cats[p.cat]=(cats[p.cat]||0)+1;});
  document.getElementById('catSummary').innerHTML=Object.entries(cats).map(([cat,n])=>{const c=CATS[cat]||CATS['อื่นๆ'];return`<span style="font-size:11px;padding:3px 10px;border-radius:20px;background:${c.bg};color:${c.c}">${cat} ${n}</span>`;}).join('')+
  `<span style="font-size:11px;padding:3px 10px;border-radius:20px;background:var(--bg2);color:var(--text2)">รวม ${all.length} แผน</span>`;
}

function selectDay(ds,d){
  selDay=ds; renderCal();
  document.getElementById('detailPanel').style.display='block';
  document.getElementById('addForm').style.display='none';
  const thDate=d+' '+TH_M[curM]+' '+(curY+543);
  document.getElementById('detailDate').textContent=thDate;
  renderDetail();
  setTimeout(()=>document.getElementById('detailPanel').scrollIntoView({behavior:'smooth',block:'nearest'}),50);
}

function renderDetail(){
  const plans=getPlans(selDay);
  document.getElementById('dayPlanList').innerHTML=plans.length?plans.map((p,i)=>{
    const c=CATS[p.cat]||CATS['อื่นๆ'];
    return`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid var(--border)">
      <div style="width:8px;height:8px;border-radius:50%;background:${c.dot};flex-shrink:0"></div>
      <span style="flex:1;font-size:13px">${p.txt}</span>
      <span class="badge" style="background:${c.bg};color:${c.c}">${p.cat}</span>
      <button onclick="delPlan(${i})" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;padding:2px"><i class="ti ti-x"></i></button>
    </div>`;
  }).join(''):'<div style="font-size:13px;color:var(--text3);padding:4px 0">ไม่มีแผนงาน</div>';
}

function toggleAddForm(){
  const f=document.getElementById('addForm');
  f.style.display=f.style.display==='none'?'block':'none';
  if(f.style.display==='block'){initCatBtns();setTimeout(()=>document.getElementById('planInput').focus(),50);}
}

function initCatBtns(){
  document.getElementById('catBtns').innerHTML=Object.entries(CATS).map(([cat,c])=>{
    const on=cat===selCat;
    return`<button class="cat-btn${on?' on':''}" style="${on?'background:'+c.dot+';color:#fff;':''}" onclick="selCatFn('${cat}',this)">${cat}</button>`;
  }).join('');
}
function selCatFn(cat,btn){
  selCat=cat;
  document.querySelectorAll('#catBtns .cat-btn').forEach(b=>{b.classList.remove('on');b.style.background='';b.style.color='';});
  btn.classList.add('on'); const c=CATS[cat]; btn.style.background=c.dot; btn.style.color='#fff';
}

function savePlan(){
  const txt=document.getElementById('planInput').value.trim(); if(!txt) return;
  const plans=getPlans(selDay); plans.push({txt,cat:selCat}); setPlans(selDay,plans);
  document.getElementById('planInput').value='';
  document.getElementById('addForm').style.display='none';
  renderCal(); toast('เพิ่มแผนแล้ว');
}
function delPlan(i){ const plans=getPlans(selDay); plans.splice(i,1); setPlans(selDay,plans); renderCal(); }
function prevMonth(){ curM--; if(curM<1){curM=12;curY--;} selDay=null; document.getElementById('detailPanel').style.display='none'; renderCal(); }
function nextMonth(){ curM++; if(curM>12){curM=1;curY++;} selDay=null; document.getElementById('detailPanel').style.display='none'; renderCal(); }
function toast(msg){const t=document.getElementById('_toast');t.innerHTML='<i class="ti ti-check"></i> '+msg;t.style.display='flex';setTimeout(()=>t.style.display='none',2500);}

renderCal();
</script>
</body>
</html>
