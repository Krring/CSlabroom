<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>สมัครสมาชิก — Kring Labroom</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
.reg-wrap{max-width:500px;margin:0 auto;padding:2rem 1.5rem;}
.step-bar{display:flex;align-items:center;gap:0;margin-bottom:2rem;}
.step{display:flex;align-items:center;gap:6px;font-size:12px;font-family:'DM Mono',monospace;}
.step-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;transition:all .2s;}
.step.done .step-num{background:#1D9E75;color:#fff;}
.step.active .step-num{background:var(--text);color:var(--bg);}
.step.pending .step-num{background:var(--bg2);color:var(--text2);}
.step.active .step-txt{color:var(--text);font-weight:500;}
.step.pending .step-txt,.step.done .step-txt{color:var(--text2);}
.step-line{flex:1;height:1px;background:var(--border);margin:0 8px;}
</style>
</head>
<body>
<script src="shared.js"></script>
<nav class="nav">
  <a class="nav-logo" href="index.html">
    <svg width="28" height="28" viewBox="0 0 48 48"><rect width="48" height="48" rx="10" fill="#F1EFE8"/><rect x="19" y="14" width="10" height="10" rx="3" fill="#F5C4B3"/><rect x="19" y="13" width="10" height="4" rx="2" fill="#444441"/><rect x="18" y="14" width="3" height="5" rx="1" fill="#444441"/><rect x="21" y="18" width="2" height="2" rx="1" fill="#2C2C2A"/><rect x="25" y="18" width="2" height="2" rx="1" fill="#2C2C2A"/><rect x="22" y="21" width="4" height="1" rx=".5" fill="#993C1D"/><rect x="16" y="24" width="16" height="12" rx="2" fill="#1D9E75"/><rect x="15" y="24" width="4" height="10" rx="1" fill="#fff"/><rect x="29" y="24" width="4" height="10" rx="1" fill="#fff"/><rect x="18" y="35" width="4" height="5" rx="1" fill="#185FA5"/><rect x="26" y="35" width="4" height="5" rx="1" fill="#185FA5"/><rect x="17" y="38" width="5" height="3" rx="1" fill="#2C2C2A"/><rect x="25" y="38" width="5" height="3" rx="1" fill="#2C2C2A"/></svg>
    <div><div class="nav-logo-name">Aj. Kring Labroom</div><div class="nav-logo-sub">KU_KPS · Plant Pathology</div></div>
  </a>
</nav>

<div class="reg-wrap">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:1.5rem;">
    <a href="index.html" class="btn btn-sm"><i class="ti ti-arrow-left"></i> กลับ</a>
    <span style="font-size:15px;font-weight:500">สมัครสมาชิก</span>
  </div>
  <div class="step-bar">
    <div class="step active" id="step1"><div class="step-num">1</div><div class="step-txt">ข้อมูลส่วนตัว</div></div>
    <div class="step-line"></div>
    <div class="step pending" id="step2"><div class="step-num">2</div><div class="step-txt">การศึกษา</div></div>
    <div class="step-line"></div>
    <div class="step pending" id="step3"><div class="step-num">3</div><div class="step-txt">รอ Approve</div></div>
  </div>

  <!-- Step 1 -->
  <div id="s1" class="card">
    <div style="font-size:14px;font-weight:500;margin-bottom:1rem">ข้อมูลส่วนตัว</div>
    <div id="err1" class="f-error"><i class="ti ti-alert-circle"></i><span id="errtxt1"></span></div>
    <div class="f-row">
      <div class="f-group" style="margin-bottom:0"><label class="f-label">ชื่อ</label><input type="text" id="r-fname" class="f-input" placeholder="ชื่อ"></div>
      <div class="f-group" style="margin-bottom:0"><label class="f-label">นามสกุล</label><input type="text" id="r-lname" class="f-input" placeholder="นามสกุล"></div>
    </div>
    <div class="f-group" style="margin-top:10px"><label class="f-label">อีเมล (KU)</label><input type="email" id="r-email" class="f-input" placeholder="xxxxx@ku.th"></div>
    <div class="f-row">
      <div class="f-group" style="margin-bottom:0"><label class="f-label">รหัสผ่าน</label><input type="password" id="r-pass" class="f-input" placeholder="อย่างน้อย 6 ตัว"></div>
      <div class="f-group" style="margin-bottom:0"><label class="f-label">ยืนยันรหัสผ่าน</label><input type="password" id="r-pass2" class="f-input" placeholder="ยืนยัน"></div>
    </div>
    <div style="display:flex;justify-content:flex-end;margin-top:1rem">
      <button class="btn btn-pri" onclick="nextStep1()">ถัดไป <i class="ti ti-arrow-right"></i></button>
    </div>
  </div>

  <!-- Step 2 -->
  <div id="s2" class="card" style="display:none">
    <div style="font-size:14px;font-weight:500;margin-bottom:1rem">ข้อมูลการศึกษา</div>
    <div id="err2" class="f-error"><i class="ti ti-alert-circle"></i><span id="errtxt2"></span></div>
    <div class="f-group"><label class="f-label">ระดับการศึกษา</label>
      <select id="r-level" class="f-input">
        <option value="">-- เลือก --</option>
        <option value="bachelor">ปริญญาตรี (ปัญหาพิเศษ)</option>
        <option value="master">ปริญญาโท</option>
        <option value="phd">ปริญญาเอก</option>
      </select>
    </div>
    <div class="f-row">
      <div class="f-group" style="margin-bottom:0"><label class="f-label">รหัสนิสิต</label><input type="text" id="r-sid" class="f-input" placeholder="เช่น 6710450001"></div>
      <div class="f-group" style="margin-bottom:0"><label class="f-label">ปีที่เข้าศึกษา (พ.ศ.)</label><input type="text" id="r-year" class="f-input" placeholder="เช่น 2567"></div>
    </div>
    <div class="f-group" style="margin-top:10px"><label class="f-label">หัวข้อวิจัย / ปัญหาพิเศษ (ถ้ามี)</label><input type="text" id="r-topic" class="f-input" placeholder="เช่น การศึกษาโรคใบไหม้ในข้าว"></div>
    <div class="f-group"><label class="f-label">หมายเหตุถึงอาจารย์ (ถ้ามี)</label><textarea id="r-note" class="f-input" style="min-height:52px"></textarea></div>
    <div style="display:flex;justify-content:space-between;margin-top:1rem">
      <button class="btn" onclick="backStep()"><i class="ti ti-arrow-left"></i> ย้อนกลับ</button>
      <button class="btn btn-pri" onclick="submitReg()"><i class="ti ti-send"></i> ส่งคำขอสมัคร</button>
    </div>
  </div>

  <!-- Step 3 -->
  <div id="s3" class="card" style="display:none;text-align:center;padding:2.5rem 1.5rem">
    <div style="font-size:40px;margin-bottom:14px">⏳</div>
    <div style="font-size:16px;font-weight:500;margin-bottom:6px">รอการอนุมัติจากอาจารย์</div>
    <div style="font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:1rem">ส่งคำขอแล้ว! อาจารย์จะตรวจสอบและอนุมัติภายใน 1–2 วัน<br>เมื่อได้รับอนุมัติจะสามารถ login เข้าระบบได้ทันที</div>
    <div id="pendingInfo" style="font-size:12px;font-family:'DM Mono',monospace;color:var(--text3);background:var(--bg2);padding:8px 12px;border-radius:var(--r);margin-bottom:1.5rem;display:inline-block"></div>
    <br>
    <a href="index.html" class="btn" style="display:inline-flex;margin-top:1rem"><i class="ti ti-home"></i> กลับหน้าแรก</a>
  </div>
</div>

<script>
const LEVEL_LABEL = {bachelor:'ป.ตรี',master:'ป.โท',phd:'ป.เอก'};
const AV_COLORS = [['#e1f5ee','#0f6e56'],['#eeedfe','#534ab7'],['#faeeda','#854f0b'],['#e6f1fb','#0c447c']];
let regData = {};

function setStep(n) {
  [1,2,3].forEach(i => {
    const s = document.getElementById('step'+i);
    s.className = 'step ' + (i<n?'done':i===n?'active':'pending');
  });
}
function nextStep1() {
  const fname=document.getElementById('r-fname').value.trim();
  const lname=document.getElementById('r-lname').value.trim();
  const email=document.getElementById('r-email').value.trim();
  const pass=document.getElementById('r-pass').value;
  const pass2=document.getElementById('r-pass2').value;
  if(!fname||!lname){showErr(1,'กรุณากรอกชื่อ-นามสกุล');return;}
  if(!email.includes('@')){showErr(1,'กรุณาใช้อีเมล KU (@ku.th)');return;}
  if(pass.length<6){showErr(1,'รหัสผ่านต้องมีอย่างน้อย 6 ตัว');return;}
  if(pass!==pass2){showErr(1,'รหัสผ่านไม่ตรงกัน');return;}
  regData={fname,lname,email,pass};
  document.getElementById('s1').style.display='none';
  document.getElementById('s2').style.display='block';
  setStep(2);
}
function backStep() {
  document.getElementById('s2').style.display='none';
  document.getElementById('s1').style.display='block';
  setStep(1);
}
function submitReg() {
  const level=document.getElementById('r-level').value;
  const sid=document.getElementById('r-sid').value.trim();
  const year=document.getElementById('r-year').value.trim();
  if(!level){showErr(2,'กรุณาเลือกระดับการศึกษา');return;}
  if(!sid){showErr(2,'กรุณากรอกรหัสนิสิต');return;}
  regData={...regData,level,sid,year,topic:document.getElementById('r-topic').value.trim(),note:document.getElementById('r-note').value.trim()};
  const pending = KU.getPending();
  const initials = (regData.fname[0]||'')+(regData.lname[0]||'');
  const ac = AV_COLORS[pending.length%4];
  const now = new Date().toLocaleDateString('th-TH',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
  pending.push({id:'p'+Date.now(),name:regData.fname+' '+regData.lname,email:regData.email,level:regData.level,sid:regData.sid,year:regData.year,topic:regData.topic,note:regData.note,avbg:ac[0],avc:ac[1],av:initials,pass:regData.pass,time:now});
  KU.setPending(pending);
  document.getElementById('pendingInfo').textContent='ชื่อ: '+regData.fname+' '+regData.lname+' · '+(LEVEL_LABEL[level]||level)+' · รหัส: '+sid;
  document.getElementById('s2').style.display='none';
  document.getElementById('s3').style.display='block';
  setStep(3);
}
function showErr(step, msg) {
  const el=document.getElementById('err'+step);
  document.getElementById('errtxt'+step).textContent=msg;
  el.classList.add('show');
}
</script>
</body>
</html>
